version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: video_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    container_name: video_backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8000:8000"
    volumes:
      - shared_uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: video_worker
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/app/uploads
    volumes:
      - shared_uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: video_frontend
    ports:
      - "3000:3000"

volumes:
  shared_uploads:
